flower: "0.1"
id: invalid
title: with invalid actions
flows:
  - id: invalid
    description: Invalid flow
    inputs:
      properties:
        myInput:
          type: string
    steps:
      - id: invalid
        request:
          method: GET
          url: https://example.org/api/v1/invalid
          body:
            myInput: "$inputs.myInput"
        actions:
          - when: "$statusCode == 200"
            do: nothing
